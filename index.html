<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Audiology Dashboard</title>

  <!-- Google APIs -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>

  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>🎧 Audiology Dashboard</h1>

<div class="controls">
  <button id="loginBtn">Login with Google</button>
  <button id="loadBtn">Load Data</button>
  <button id="saveBtn">Save Data</button>
</div>

<div class="form">
  <h2>Add Entry</h2>

  <input id="name" placeholder="Audiologist">
  <input id="period" type="number" placeholder="Period (1-12)">
  <input id="sales" type="number" placeholder="Total Sales (£)">
  <input id="hearingAids" type="number" placeholder="Hearing Aid Sales">
  <input id="wax" type="number" placeholder="Wax Removals">
  <input id="waxRevenue" type="number" placeholder="Wax Revenue (£)">
  <input id="refunds" type="number" placeholder="Refunds (£)">
  <input id="hhc" type="number" placeholder="HHC">
  <input id="hce" type="number" placeholder="HCE">

  <button onclick="addEntry()">Add Entry</button>
</div>

<h2>📊 Data Output</h2>
<pre id="output"></pre>

<script src="app.js"></script>
</body>
</html>
