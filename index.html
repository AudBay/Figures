<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Audiology BI SaaS</title>

<link rel="stylesheet" href="styles.css">

<script src="https://accounts.google.com/gsi/client"></script>
<script src="https://apis.google.com/js/api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="app.js" defer></script>
</head>

<body>

<div class="layout">

  <div class="sidebar">
    <h2>BI SaaS</h2>

    <button onclick="setView('overview')">Overview</button>
    <button onclick="setView('table')">Data</button>
    <button onclick="setView('charts')">Charts</button>
    <button onclick="setView('insights')">Insights</button>

    <hr>

    <button id="loginBtn">Login</button>
    <button id="loadBtn">Load</button>
    <button id="saveBtn">Save</button>
  </div>

  <div class="main">

    <h1>Audiology BI Platform</h1>

    <div class="card">
      <h3>Add Record</h3>

      <input id="name" placeholder="Audiologist">
      <input id="period" type="number" placeholder="Period">
      <input id="sales" type="number" placeholder="Sales">
      <input id="hearingAids" type="number" placeholder="Hearing Aids">
      <input id="wax" type="number" placeholder="Wax">
      <input id="waxRevenue" type="number" placeholder="Wax Revenue">
      <input id="refunds" type="number" placeholder="Refunds">
      <input id="hhc" type="number" placeholder="HHC">
      <input id="hce" type="number" placeholder="HCE">

      <button onclick="addEntry()">Add</button>
    </div>

    <div id="view"></div>

  </div>

</div>

<!-- EDIT MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <h3>Edit Record</h3>

    <input id="e_name">
    <input id="e_period" type="number">
    <input id="e_sales" type="number">
    <input id="e_hearingAids" type="number">
    <input id="e_wax" type="number">
    <input id="e_waxRevenue" type="number">
    <input id="e_refunds" type="number">
    <input id="e_hhc" type="number">
    <input id="e_hce" type="number">

    <button onclick="saveEdit()">Save</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

</body>
</html>
