<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audiology BI SaaS</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://accounts.google.com/gsi/client"></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js" defer></script>
</head>
<body>

<div class="layout">
  <div class="sidebar">
    <h2>BI SaaS</h2>
    <div class="sidebar-nav">
      <button id="nav-overview" class="active" onclick="setView('overview')">Dashboard</button>
      <button id="nav-table" onclick="setView('table')">Data Table</button>
      <button id="nav-charts" onclick="setView('charts')">Visualizations</button>
      <button id="nav-insights" onclick="setView('insights')">Insights</button>
    </div>
    <hr>
    <button id="loginBtn" class="action-btn">Connect Google</button>
    <button id="loadBtn" class="action-btn">Load Data</button>
    <button id="saveBtn" class="action-btn">Save Data</button>
  </div>

  <div class="main">
    <h1>Audiology Analytics</h1>

    <div class="card">
      <h2 class="section-title" style="margin-top:0">Log New Record</h2>
      <div class="form-grid">
        <div class="input-group"><label>Audiologist Name</label><input id="name" type="text" placeholder="e.g. Jane Doe"></div>
        <div class="input-group"><label>Period (Month/Week)</label><input id="period" type="number" placeholder="e.g. 1"></div>
        <div class="input-group"><label>Audiology Sales (£)</label><input id="sales" type="number" placeholder="0"></div>
        <div class="input-group"><label>Hearing Aids Sold</label><input id="hearingAids" type="number" placeholder="0"></div>
        <div class="input-group"><label>Wax Removals (Count)</label><input id="wax" type="number" placeholder="0"></div>
        <div class="input-group"><label>Wax Revenue (£)</label><input id="waxRevenue" type="number" placeholder="0"></div>
        <div class="input-group"><label>Refunds (£)</label><input id="refunds" type="number" placeholder="0"></div>
        <div class="input-group"><label>HHC (Health Checks)</label><input id="hhc" type="number" placeholder="0"></div>
        <div class="input-group"><label>HCE (Examinations)</label><input id="hce" type="number" placeholder="0"></div>
      </div>
      <button class="btn-primary" onclick="addEntry()">Submit Record</button>
    </div>

    <div id="view"></div>
  </div>
</div>

<!-- EDIT MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <h3>Edit Record</h3>
    <div class="form-grid">
      <div class="input-group"><label>Name</label><input id="e_name"></div>
      <div class="input-group"><label>Period</label><input id="e_period" type="number"></div>
      <div class="input-group"><label>Audiology Sales</label><input id="e_sales" type="number"></div>
      <div class="input-group"><label>Hearing Aids</label><input id="e_hearingAids" type="number"></div>
      <div class="input-group"><label>Wax Removals</label><input id="e_wax" type="number"></div>
      <div class="input-group"><label>Wax Revenue</label><input id="e_waxRevenue" type="number"></div>
      <div class="input-group"><label>Refunds</label><input id="e_refunds" type="number"></div>
      <div class="input-group"><label>HHC</label><input id="e_hhc" type="number"></div>
      <div class="input-group"><label>HCE</label><input id="e_hce" type="number"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="saveEdit()">Save Changes</button>
      <button class="btn-small" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

</body>
</html>
