<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audiology Performance BI</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js" defer></script>
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <h2 style="color:var(--accent); margin-bottom: 30px;">BI Analytics</h2>
            <button id="nav-overview" class="active" onclick="setView('overview')">Dashboard Overview</button>
            <button id="nav-table" onclick="setView('table')">Records Table</button>
            <button id="nav-charts" onclick="setView('charts')">Data Comparison</button>
            <hr style="width:100%; border:0; border-top:1px solid var(--border); margin:20px 0;">
            <button id="loginBtn" class="btn-small">Google Login</button>
        </div>

        <div class="main">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
                <h1>Insights Hub</h1>
                <div id="view-controls" style="display:none">
                    Compare by: 
                    <select id="groupBy" onchange="render()" style="padding: 5px; border-radius: 4px;">
                        <option value="name">Audiologist</option>
                        <option value="period">Period</option>
                    </select>
                </div>
            </div>

            <div class="card">
                <h3 style="margin-top:0">New Entry</h3>
                <div class="form-grid">
                    <div class="input-group"><label>Name</label><input id="name"></div>
                    <div class="input-group"><label>Period</label><input id="period" type="number"></div>
                    <div class="input-group"><label>Audiology Sales £</label><input id="sales" type="number" value="0"></div>
                    <div class="input-group"><label>H. Aids Count</label><input id="hearingAids" type="number" value="0"></div>
                    <div class="input-group"><label>Wax Count</label><input id="wax" type="number" value="0"></div>
                    <div class="input-group"><label>Wax Revenue £</label><input id="waxRevenue" type="number" value="0"></div>
                    <div class="input-group"><label>Refunds £</label><input id="refunds" type="number" value="0"></div>
                    <div class="input-group"><label>HHC Count</label><input id="hhc" type="number" value="0"></div>
                    <div class="input-group"><label>HCE Count</label><input id="hce" type="number" value="0"></div>
                </div>
                <button class="btn-primary" onclick="addEntry()">Save New Entry</button>
            </div>
            <div id="view"></div>
        </div>
    </div>

    <!-- THE POPUP (MODAL) -->
    <div id="modal" class="modal hidden">
        <div class="modal-box">
            <h3>Modify Record</h3>
            <div class="form-grid">
                <div class="input-group"><label>Name</label><input id="e_name"></div>
                <div class="input-group"><label>Period</label><input id="e_period" type="number"></div>
                <div class="input-group"><label>Sales</label><input id="e_sales" type="number"></div>
                <div class="input-group"><label>H. Aids</label><input id="e_hearingAids" type="number"></div>
                <div class="input-group"><label>Wax</label><input id="e_wax" type="number"></div>
                <div class="input-group"><label>Wax Revenue</label><input id="e_waxRevenue" type="number"></div>
                <div class="input-group"><label>Refunds</label><input id="e_refunds" type="number"></div>
                <div class="input-group"><label>HHC</label><input id="e_hhc" type="number"></div>
                <div class="input-group"><label>HCE</label><input id="e_hce" type="number"></div>
            </div>
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button class="btn-primary" onclick="saveEdit()">Apply Changes</button>
                <button class="btn-small" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>
</body>
</html>
